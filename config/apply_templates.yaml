# Apply Pack Templates
# Placeholders: {candidate_name}, {vacancy_title}, {company}, {top_keywords},
# {candidate_summary}, {github}, {linkedin}, {availability}, {location},
# {decision}, {total_score}, {risks_summary}, {fit_reasons}, {salary}

templates:
  default:
    ru:
      short: |
        Здравствуйте!

        Меня зовут {candidate_name}. Меня заинтересовала вакансия **{vacancy_title}** в **{company}**, так как мой опыт связан с {top_keywords}.

        {candidate_summary}

        Буду рад обсудить детали.
        С уважением,
        {candidate_name}
        {github}
        {linkedin}
      medium: |
        Здравствуйте!

        Меня зовут {candidate_name}. Рассматриваю позицию **{vacancy_title}** в **{company}**.

        Мой профиль:
        - {fit_reasons}

        {candidate_summary}

        Готов обсудить сотрудничество и ответить на вопросы.
        {availability}

        С уважением,
        {candidate_name}
        {github}
        {linkedin}
      detailed: |
        Здравствуйте!

        Меня зовут {candidate_name}. Меня заинтересовала позиция **{vacancy_title}** в **{company}**.

        Почему я подхожу:
        - {fit_reasons}

        Что я могу привнести:
        {candidate_summary}

        Потенциальные вопросы, которые стоит обсудить:
        - Как организован процесс онбординга?
        - Какие ключевые метрики успеха на первые 3 месяца?
        - Есть ли бюджет на инструменты / обучение?

        О себе: {location}. {availability}

        Буду рад познакомиться и обсудить возможное сотрудничество.

        С уважением,
        {candidate_name}
        {github}
        {linkedin}
    en:
      short: |
        Hello!

        My name is {candidate_name}. I'm interested in the **{vacancy_title}** role at **{company}**, as my experience aligns with {top_keywords}.

        {candidate_summary}

        Looking forward to discussing further.
        Best regards,
        {candidate_name}
        {github}
        {linkedin}
