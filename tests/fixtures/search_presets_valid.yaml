defaults:
  remote_only: true
  areas: []
  schedule:
  - remote
  experience: []
  salary_as_bonus: true
  language_priority: equal
  decision_thresholds:
    strong_match: 85
    queue: 70
    review_later: 50
    weak_match: 25
presets:
  ai_rag_test:
    enabled: true
    description: Test AI/RAG preset
    search_terms:
    - AI Engineer
    - LLM Engineer
    filters:
      remote_only: true
      areas: []
      schedule:
      - remote
      experience:
      - between3And6
      - moreThan6
    include:
      any:
      - llm
      - rag
      - python
      - fastapi
      - langchain
      - langgraph
    exclude:
      any:
      - qa automation
      - casino
      title:
      - qa engineer
    boost:
      title:
        llm: 20
        rag: 20
        ai engineer: 18
      skills:
        python: 12
        fastapi: 8
