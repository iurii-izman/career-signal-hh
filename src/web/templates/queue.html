{% extends "base.html" %} {% block content %}
<div class="queue-layout" id="queue-app">
    <!-- Filter panel -->
    <aside class="queue-filters">
        <div class="filter-group">
            <label>Min Score</label>
            <input
                type="number"
                id="f-min-score"
                value="70"
                min="0"
                max="100"
            />
        </div>
        <div class="filter-group">
            <label>Decision</label>
            <select id="f-decision">
                <option value="strong_match,queue">Strong + Queue</option>
                <option value="strong_match">Strong Match</option>
                <option value="">All</option>
                <option value="queue">Queue</option>
                <option value="weak_match">Weak Match</option>
                <option value="auto_hide">Auto Hide</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Review Status</label>
            <select id="f-status">
                <option value="">All</option>
                <option value="new">New</option>
                <option value="interesting">Interesting</option>
                <option value="maybe">Maybe</option>
                <option value="applied">Applied</option>
                <option value="rejected">Rejected</option>
                <option value="archived">Archived</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Preset</label>
            <input
                type="text"
                id="f-preset"
                placeholder="preset name"
                style="width: 100%"
            />
        </div>
        <div class="filter-group filter-checks">
            <label class="check-label"
                ><input type="checkbox" id="f-remote" checked /> Remote
                only</label
            >
            <label class="check-label"
                ><input type="checkbox" id="f-salary" /> With salary</label
            >
            <label class="check-label"
                ><input type="checkbox" id="f-hide-risk" /> Hide risk</label
            >
            <label class="check-label"
                ><input type="checkbox" id="f-new-only" /> New only</label
            >
            <label class="check-label"
                ><input type="checkbox" id="f-dedupe" checked /> Dedupe</label
            >
        </div>
        <button class="btn btn-primary" style="width: 100%" id="f-apply">
            Apply Filters
        </button>
    </aside>

    <!-- Main area -->
    <main class="queue-main">
        <!-- Top action bar -->
        <div class="queue-topbar">
            <div class="queue-topbar-left">
                <span class="queue-count" id="queue-count">0 results</span>
            </div>
            <div class="queue-topbar-right">
                <button class="btn btn-sm" id="btn-bulk-archive">
                    Archive auto_hide
                </button>
                <button class="btn btn-sm" id="btn-bulk-reject">
                    Reject score &lt;35
                </button>
                <button class="btn btn-sm" id="btn-bulk-interesting">
                    Interesting 85+
                </button>
                <button class="btn btn-sm" id="btn-apply-top">
                    Top 5 Apply Packs
                </button>
                <button class="btn btn-primary btn-sm" id="btn-refresh">
                    Refresh
                </button>
            </div>
        </div>

        <!-- Vacancy cards -->
        <div class="queue-cards" id="queue-cards">
            <div class="queue-empty">Loading...</div>
        </div>

        <!-- Detail drawer -->
        <div
            class="queue-drawer-backdrop"
            id="drawer-backdrop"
            style="display: none"
        ></div>
        <div class="queue-drawer" id="drawer" style="display: none">
            <div class="drawer-header">
                <h3 id="drawer-title">Vacancy Detail</h3>
                <button class="queue-close" id="drawer-close">&times;</button>
            </div>
            <div class="drawer-body" id="drawer-body">Loading...</div>
        </div>

        <!-- Bulk confirm modal -->
        <div class="queue-overlay" id="confirm-overlay" style="display: none">
            <div class="queue-panel confirm-panel">
                <div class="queue-header">
                    <h2 id="confirm-title">Confirm Bulk Action</h2>
                </div>
                <div class="queue-body">
                    <p id="confirm-message"></p>
                    <label class="check-label" style="margin-top: 12px">
                        <input type="checkbox" id="confirm-force" /> Force
                        (include protected: applied/interview/offer)
                    </label>
                    <div
                        style="
                            margin-top: 16px;
                            display: flex;
                            gap: 8px;
                            justify-content: flex-end;
                        "
                    >
                        <button class="btn btn-secondary" id="confirm-cancel">
                            Cancel
                        </button>
                        <button class="btn btn-danger" id="confirm-ok">
                            Confirm
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<div class="toast-container" id="toast-container"></div>
{% endblock %} {% block scripts %}
<script>
    (function () {
        "use strict";
        var qs = { rows: [], confirmCallback: null };
        function $(s) {
            return document.querySelector(s);
        }
        function esc(s) {
            return String(s || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }
        function toast(msg, ok) {
            var c = $("#toast-container");
            if (!c) return;
            var t = document.createElement("div");
            t.className = "toast " + (ok ? "ok" : "error");
            t.innerHTML =
                "<span>" +
                esc(msg) +
                '</span><button class="toast-close" onclick="this.parentElement.remove()">&times;</button>';
            c.appendChild(t);
            setTimeout(function () {
                if (t.parentElement) t.remove();
            }, 4000);
        }
        async function apiGet(url) {
            return (await fetch(url)).json();
        }
        async function apiPost(url, body) {
            return (
                await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body || {}),
                })
            ).json();
        }

        function initQueue() {
            $("#f-apply").addEventListener("click", loadQueue);
            $("#btn-refresh").addEventListener("click", loadQueue);
            $("#btn-bulk-archive").addEventListener("click", function () {
                showBulkConfirm(
                    "Archive all auto_hide vacancies?",
                    function (force) {
                        apiPost("/api/review/bulk-archive", {
                            confirm: true,
                            force: force,
                        }).then(function (r) {
                            toast(r.message, r.ok);
                            loadQueue();
                        });
                    },
                );
            });
            $("#btn-bulk-reject").addEventListener("click", function () {
                showBulkConfirm(
                    "Reject all with score \u2264 35?",
                    function (force) {
                        apiPost("/api/review/bulk-reject", {
                            max_score: 35,
                            confirm: true,
                            force: force,
                        }).then(function (r) {
                            toast(r.message, r.ok);
                            loadQueue();
                        });
                    },
                );
            });
            $("#btn-bulk-interesting").addEventListener("click", function () {
                showBulkConfirm(
                    "Mark all strong_match (85+) interesting?",
                    function (force) {
                        apiPost("/api/review/bulk-interesting", {
                            min_score: 85,
                            decision: "strong_match",
                            confirm: true,
                            force: force,
                        }).then(function (r) {
                            toast(r.message, r.ok);
                            loadQueue();
                        });
                    },
                );
            });
            $("#btn-apply-top").addEventListener("click", function () {
                apiPost("/api/jobs/apply-pack-top?limit=5", {}).then(
                    function (r) {
                        toast((r && r.message) || "Started", r && r.ok);
                    },
                );
            });
            $("#drawer-close").addEventListener("click", closeDrawer);
            $("#drawer-backdrop").addEventListener("click", closeDrawer);
            $("#confirm-cancel").addEventListener("click", closeConfirm);
            $("#confirm-ok").addEventListener("click", function () {
                var f = $("#confirm-force").checked;
                if (qs.confirmCallback) qs.confirmCallback(f);
                closeConfirm();
            });
            loadQueue();
        }

        function getFilterParams() {
            var p = {
                min_score: parseInt($("#f-min-score").value) || 0,
                limit: 50,
            };
            var d = $("#f-decision");
            if (d && d.value) p.decision = d.value;
            var s = $("#f-status");
            if (s && s.value) p.status = s.value;
            var pr = $("#f-preset");
            if (pr && pr.value.trim()) p.preset = pr.value.trim();
            if ($("#f-remote").checked) p.remote_only = true;
            if ($("#f-salary").checked) p.with_salary = true;
            if ($("#f-hide-risk").checked) p.hide_risk = true;
            if ($("#f-new-only").checked) p.new_only = true;
            if ($("#f-dedupe").checked) p.dedupe = true;
            return p;
        }

        function buildQS(p) {
            var parts = [];
            for (var k in p) {
                if (p[k] !== undefined && p[k] !== null)
                    parts.push(
                        encodeURIComponent(k) + "=" + encodeURIComponent(p[k]),
                    );
            }
            return parts.join("&");
        }

        async function loadQueue() {
            var p = getFilterParams();
            try {
                var r = await apiGet("/api/queue?" + buildQS(p));
                if (r && r.ok && r.data) {
                    qs.rows = r.data;
                    renderQueue(r.data, r.count);
                } else {
                    toast(r.message || "Failed", false);
                }
            } catch (e) {
                toast("Error: " + e.message, false);
            }
        }

        function renderQueue(rows, count) {
            var el = $("#queue-count");
            if (el) el.textContent = count + " results";
            var c = $("#queue-cards");
            if (!c) return;
            if (!rows || !rows.length) {
                c.innerHTML =
                    '<div class="queue-empty">No vacancies match.</div>';
                return;
            }
            c.innerHTML = rows.map(renderVCard).join("");
        }

        function scoreClass(s) {
            if (s >= 85) return "high";
            if (s >= 50) return "mid";
            if (s > 0) return "low";
            return "none";
        }
        function shortSal(f, t, c) {
            if (!f && !t) return "-";
            var p = [];
            if (f) p.push(String(f));
            if (t) p.push(String(t));
            var s = p.join("-");
            if (c) s += " " + c;
            return s;
        }

        function renderVCard(r) {
            var s = r.total_score || 0,
                cls = scoreClass(s),
                dec = r.decision || "unknown",
                preset = r.best_profile || r.preset_name || "",
                status = r.review_status || "new",
                sal = shortSal(r.salary_from, r.salary_to, r.salary_currency);
            var risk = "";
            try {
                var rf =
                    typeof r.risk_flags_json === "string"
                        ? JSON.parse(r.risk_flags_json)
                        : r.risk_flags_json || [];
                if (rf.length)
                    risk =
                        '<div class="vcard-risks">' +
                        esc(rf.slice(0, 3).join(", ")) +
                        "</div>";
            } catch (e) {}
            var note = r.user_notes
                ? '<div class="vcard-note">' +
                  esc(r.user_notes.substring(0, 120)) +
                  "</div>"
                : "";
            var cluster = r._cluster_size
                ? ' <span style="font-size:10px;color:var(--muted)">(' +
                  r._cluster_size +
                  " dupes)</span>"
                : "";
            return (
                '<div class="vcard" data-id="' +
                r.id +
                '"><div class="vcard-score ' +
                cls +
                '">' +
                s +
                '</div><div class="vcard-body"><div class="vcard-badges"><span class="badge badge-' +
                dec +
                '">' +
                dec +
                "</span>" +
                (preset
                    ? '<span class="badge badge-preset">' +
                      esc(preset) +
                      "</span>"
                    : "") +
                '<span class="badge badge-preset">' +
                status +
                '</span></div><div class="vcard-title">' +
                esc(r.name || "-") +
                cluster +
                '</div><div class="vcard-company">' +
                esc(r.employer_name || "") +
                '</div><div class="vcard-meta"><span>' +
                esc(sal) +
                "</span><span>" +
                esc(r.schedule_name || "-") +
                "</span><span>" +
                esc(r.area_name || "") +
                "</span></div>" +
                risk +
                note +
                '<div class="vcard-actions"><button class="btn btn-sm" data-vid="' +
                r.id +
                '" data-va="interesting">Interesting</button><button class="btn btn-sm" data-vid="' +
                r.id +
                '" data-va="maybe">Maybe</button><button class="btn btn-sm" data-vid="' +
                r.id +
                '" data-va="rejected">Reject</button><button class="btn btn-sm" data-vid="' +
                r.id +
                '" data-va="archived">Archive</button><button class="btn btn-sm" data-vid="' +
                r.id +
                '" data-va="apply-pack">Apply Pack</button><button class="btn btn-sm" data-vid="' +
                r.id +
                '" data-va="applied">Mark Applied</button><a class="btn btn-sm" href="' +
                esc(r.alternate_url || "#") +
                '" target="_blank" rel="noopener">HH.ru</a><a class="btn btn-sm" href="/vacancy/' +
                r.id +
                '">Full Page</a></div></div></div>'
            );
        }

        document.addEventListener("click", function (e) {
            var btn = e.target.closest("[data-va]");
            if (!btn) return;
            var vid = btn.getAttribute("data-vid"),
                va = btn.getAttribute("data-va");
            if (!vid) return;
            if (
                va === "interesting" ||
                va === "maybe" ||
                va === "rejected" ||
                va === "archived"
            ) {
                apiPost("/api/vacancies/" + vid + "/status", {
                    status: va,
                }).then(function (r) {
                    toast(r.message, r.ok);
                    if (r.ok) loadQueue();
                });
            } else if (va === "apply-pack") {
                apiPost("/api/vacancies/" + vid + "/apply-pack").then(
                    function (r) {
                        toast(r.message, r.ok);
                    },
                );
            } else if (va === "applied") {
                apiPost("/api/vacancies/" + vid + "/applied", {
                    date: "today",
                }).then(function (r) {
                    toast(r.message, r.ok);
                    if (r.ok) loadQueue();
                });
            }
        });

        function showBulkConfirm(msg, cb) {
            $("#confirm-message").textContent = msg;
            $("#confirm-force").checked = false;
            $("#confirm-overlay").style.display = "flex";
            qs.confirmCallback = cb;
        }
        function closeConfirm() {
            $("#confirm-overlay").style.display = "none";
            qs.confirmCallback = null;
        }
        function closeDrawer() {
            $("#drawer-backdrop").style.display = "none";
            $("#drawer").style.display = "none";
        }

        if (document.readyState === "loading")
            document.addEventListener("DOMContentLoaded", initQueue);
        else initQueue();
    })();
</script>
{% endblock %}
